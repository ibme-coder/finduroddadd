<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OddOdd AddAdd Tennis Club – Find Your Class</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sarabun:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: rgba(255,255,255,0.08);
    --gold: #f0c040;
    --gold2: #e8a800;
    --text: #f0f0f0;
    --muted: #8a9ab0;
    --class-c: #22c55e;
    --class-b: #3b82f6;
    --class-a: #ef4444;
    --class-s: #a855f7;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(168,85,247,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

  /* ---- COVER ---- */
  #screen-cover { text-align: center; padding-top: 20px; }

  .cover-img {
    width: 100%; border-radius: var(--radius);
    box-shadow: 0 0 60px rgba(168,85,247,0.3);
    display: block; margin: 0 auto;
  }

  .start-btn {
    margin-top: 24px;
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #1a0e00;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    border: none; border-radius: 50px;
    padding: 14px 48px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(240,192,64,0.4);
    transition: transform .15s, box-shadow .15s;
    width: 100%;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(240,192,64,0.55); }

  /* ---- QUIZ ---- */
  #screen-quiz { display: none; }

  .progress-bar-wrap {
    height: 6px; background: rgba(255,255,255,0.1); border-radius: 99px; margin: 20px 0 28px;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--gold2), var(--gold));
    transition: width .4s ease;
  }

  .q-counter {
    font-size: .8rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 8px;
  }

  .q-text {
    font-size: 1.25rem; font-weight: 700; line-height: 1.5; margin-bottom: 24px;
    min-height: 60px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }

  .opt-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 1rem; font-weight: 600;
    text-align: left; padding: 16px 18px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; align-items: center; gap: 12px;
  }
  .opt-btn .letter {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
    flex-shrink: 0;
  }
  .opt-btn:hover { border-color: var(--gold); background: rgba(240,192,64,0.06); transform: translateX(4px); }
  .opt-btn.selected { border-color: var(--gold); background: rgba(240,192,64,0.12); }
  .opt-btn.selected .letter { background: var(--gold2); color: #1a0e00; }

  /* ---- GENDER ---- */
  #screen-gender { display: none; text-align: center; padding-top: 40px; }
  .gender-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; }
  .gender-sub { color: var(--muted); margin-bottom: 32px; }

  .gender-btns { display: flex; gap: 16px; justify-content: center; }
  .gender-btn {
    flex: 1; max-width: 180px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 16px;
    cursor: pointer; transition: border-color .15s, transform .15s;
    color: var(--text); font-family: 'Sarabun', sans-serif;
  }
  .gender-btn .icon { font-size: 3rem; display: block; margin-bottom: 12px; }
  .gender-btn .label { font-size: 1.1rem; font-weight: 700; }
  .gender-btn:hover { border-color: var(--gold); transform: translateY(-4px); }

  /* ---- RESULT ---- */
  #screen-result { display: none; text-align: center; padding-top: 24px; }

  .result-card {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    position: relative;
    margin-bottom: 28px;
  }
  .result-card img { width: 100%; display: block; }

  .result-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem; letter-spacing: 3px;
    margin: 8px 0 4px;
  }

  .result-quote {
    font-size: 1.1rem; color: var(--muted); font-style: italic;
    margin-bottom: 24px;
  }

  .action-btns { display: flex; flex-direction: column; gap: 12px; }

  .btn-save {
    background: linear-gradient(135deg, var(--gold2), var(--gold));
    color: #1a0e00;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 2px;
    border: none; border-radius: 50px;
    padding: 14px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(240,192,64,0.35);
    transition: transform .15s;
  }
  .btn-save:hover { transform: translateY(-2px); }

  .btn-retry {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    font-family: 'Sarabun', sans-serif; font-size: 1rem; font-weight: 600;
    padding: 12px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-retry:hover { border-color: var(--text); color: var(--text); }

  /* easter egg badge */
  .easter-badge {
    display: inline-block;
    background: linear-gradient(135deg, #7e22ce, #a855f7);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: .85rem; font-weight: 700;
    margin-bottom: 12px;
    box-shadow: 0 0 20px rgba(168,85,247,0.5);
  }

  /* score bar visual */
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .score-label { font-size: .85rem; width: 60px; text-align: right; color: var(--muted); }
  .score-track { flex: 1; height: 8px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 99px; }
  .score-val { font-size: .85rem; width: 20px; color: var(--muted); }

  .scores-block { margin-bottom: 24px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- COVER -->
  <div id="screen-cover">
    <img class="cover-img" src="cover.png" alt="OddOdd AddAdd Tennis Club">
    <button class="start-btn" onclick="startQuiz()">🎾 เริ่มค้นหาคลาสของคุณ</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="q-counter" id="q-counter">ข้อ 1 / 7</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <!-- GENDER -->
  <div id="screen-gender">
    <div class="gender-title">คุณเป็นเพศไหน?</div>
    <div class="gender-sub">เลือกตัวการ์ตูนที่ตรงกับคุณ</div>
    <div class="gender-btns">
      <button class="gender-btn" onclick="showResult('male')">
        <span class="icon">👨</span>
        <span class="label">ชาย</span>
      </button>
      <button class="gender-btn" onclick="showResult('female')">
        <span class="icon">👩</span>
        <span class="label">หญิง</span>
      </button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result">
    <div id="easter-badge-wrap"></div>
    <div class="result-card">
      <img id="result-img" src="" alt="Result">
    </div>
    <div class="result-label" id="result-label"></div>
    <div class="result-quote" id="result-quote"></div>

    <div class="scores-block" id="scores-block"></div>

    <div class="action-btns">
      <button class="btn-save" onclick="saveImage()">💾 บันทึกรูปเพื่อแชร์</button>
      <button class="btn-retry" onclick="retryQuiz()">🔄 เล่นใหม่อีกครั้ง</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    q: "🎾 Q1. ก่อนลงคอร์ท สิ่งที่สำคัญที่สุดคืออะไร?",
    opts: [
      { letter: "A", text: "มุมถ่ายรูปและชุดวันนี้ 📸", val: "C" },
      { letter: "B", text: "เพื่อนมาครบยัง ☕", val: "B" },
      { letter: "C", text: "วอร์มร่างกายก่อน 🏃", val: "A" },
      { letter: "D", text: "วันนี้พกยาหม่องมาหรือยัง 🩹", val: "S" },
    ]
  },
  {
    q: "🎾 Q2. หลังตีครบ 2 ชั่วโมง คุณเป็นแบบไหน?",
    opts: [
      { letter: "A", text: "รูปลงสตอรี่ครบแล้ว", val: "C" },
      { letter: "B", text: "นั่งเม้าท์ต่ออีก 1 ชั่วโมง", val: "B" },
      { letter: "C", text: "เริ่มตึงนิดหน่อยแต่ไหว", val: "A" },
      { letter: "D", text: "ลุกจากเก้าอี้ต้องใช้เวลา", val: "S" },
    ]
  },
  {
    q: "🎾 Q3. เปิดกระเป๋าเทนนิสของคุณ เจออะไรบ่อยที่สุด?",
    opts: [
      { letter: "A", text: "น้ำหอม / หวี", val: "C" },
      { letter: "B", text: "กาแฟ / ขนม", val: "B" },
      { letter: "C", text: "เทปพันข้อ / Support", val: "A" },
      { letter: "D", text: "ใบเสร็จกายภาพ", val: "S" },
    ]
  },
  {
    q: "🎾 Q4. คุณตีเทนนิสเพื่ออะไร?",
    opts: [
      { letter: "A", text: "ได้รูปสวย ๆ", val: "C" },
      { letter: "B", text: "เจอเพื่อน", val: "B" },
      { letter: "C", text: "แข่งกับตัวเอง", val: "A" },
      { letter: "D", text: "พิสูจน์ว่าร่างกายยังไม่พัง", val: "S" },
    ]
  },
  {
    q: "🎾 Q5. เวลามีคนถามว่า 'เป็นไงบ้าง?'",
    opts: [
      { letter: "A", text: "วันนี้แสงดีมาก", val: "C" },
      { letter: "B", text: "สนุกดี คนเยอะ", val: "B" },
      { letter: "C", text: "เมื่อยหลังนิดหน่อย", val: "A" },
      { letter: "D", text: "เข่า ศอก หลัง เอ็นร้อยหวาย ครบ", val: "S" },
    ]
  },
  {
    q: "🎾 Q6. วันรุ่งขึ้นหลังตีหนัก",
    opts: [
      { letter: "A", text: "พร้อมถ่ายรูปต่อ", val: "C" },
      { letter: "B", text: "พร้อมไปกินข้าวกับเพื่อน", val: "B" },
      { letter: "C", text: "ปวดนิดหน่อยแต่ทำงานได้", val: "A" },
      { letter: "D", text: "เดินลงบันไดทีละขั้น", val: "S" },
    ]
  },
  {
    q: "🎾 Q7. ถ้าสนามว่างคืนนี้ คุณจะ...",
    opts: [
      { letter: "A", text: "ไปถ่ายคอนเทนต์", val: "C" },
      { letter: "B", text: "ชวนเพื่อนมาตี", val: "B" },
      { letter: "C", text: "จองทันที", val: "A" },
      { letter: "D", text: "จองทันที แล้วค่อยโทรหานักกายภาพ", val: "S" },
    ]
  }
];

const classes = {
  C: {
    label: "🟢 Class C – Content Creator",
    quote: '"เดี๋ยวถ่ายรูปก่อน"',
    color: "#22c55e",
    imgs: { male: "class-c-male.jpg", female: "class-c-female.jpg" },
    scores: [
      { label: "Forehand", val: 2, max: 5, color: "#22c55e" },
      { label: "Content", val: 5, max: 5, color: "#f0c040" },
      { label: "Style", val: 5, max: 5, color: "#f0c040" },
    ]
  },
  B: {
    label: "🔵 Class B – Social Hitter",
    quote: '"เมื่อวานฝนตกแถวบ้านป่ะ"',
    color: "#3b82f6",
    imgs: { male: "class-b-male.jpg", female: "class-b-female.jpg" },
    scores: [
      { label: "Tennis", val: 3, max: 5, color: "#3b82f6" },
      { label: "Social", val: 5, max: 5, color: "#f0c040" },
      { label: "Small Talk", val: 5, max: 5, color: "#f0c040" },
    ]
  },
  A: {
    label: "🔴 Class A – Weekend Warrior",
    quote: '"ปวดนิดหน่อย ตีได้"',
    color: "#ef4444",
    imgs: { male: "class-a-male.jpg", female: "class-a-female.jpg" },
    scores: [
      { label: "Grit", val: 4, max: 5, color: "#ef4444" },
      { label: "Toughness", val: 5, max: 5, color: "#f0c040" },
      { label: "Recovery", val: 2, max: 5, color: "#ef4444" },
    ]
  },
  S: {
    label: "🟣 Class S – Director of Hospital",
    quote: '"หมอนัดพรุ่งนี้ เดี๋ยวค่อยไป"',
    color: "#a855f7",
    imgs: { male: "class-s-male.jpg", female: "class-s-female.jpg" },
    scores: [
      { label: "Medical", val: 7, max: 7, color: "#a855f7" },
      { label: "Attendance", val: 7, max: 7, color: "#a855f7" },
      { label: "Body", val: 1, max: 5, color: "#ef4444" },
    ]
  }
};

let answers = [];
let currentQ = 0;
let resultClass = null;

function startQuiz() {
  answers = []; currentQ = 0; resultClass = null;
  document.getElementById('screen-cover').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('q-counter').textContent = `ข้อ ${currentQ + 1} / ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = `${(currentQ / questions.length) * 100}%`;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="letter">${opt.letter}</span><span>${opt.text}</span>`;
    btn.onclick = () => pickAnswer(opt.val);
    optDiv.appendChild(btn);
  });
}

function pickAnswer(val) {
  answers.push(val);
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    calcResult();
  }
}

function calcResult() {
  const counts = { C: 0, B: 0, A: 0, S: 0 };
  answers.forEach(a => counts[a]++);
  const top = Object.entries(counts).sort((x, y) => y[1] - x[1])[0][0];
  resultClass = top;
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-gender').style.display = 'block';
}

function showResult(gender) {
  document.getElementById('screen-gender').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';

  const cls = classes[resultClass];
  const imgSrc = gender === 'male' ? cls.imgs.male : cls.imgs.female;
  document.getElementById('result-img').src = imgSrc;
  document.getElementById('result-label').textContent = cls.label;
  document.getElementById('result-quote').textContent = cls.quote;

  // Easter egg
  const dCount = answers.filter(a => a === 'S').length;
  const badge = document.getElementById('easter-badge-wrap');
  if (dCount >= 5) {
    badge.innerHTML = `<div class="easter-badge">👑🏥 Class S+ – VIP Member โรงพยาบาล<br><small style="font-weight:400">คุณไม่ได้เลือกเทนนิส เทนนิสเลือกคุณ</small></div>`;
  } else {
    badge.innerHTML = '';
  }

  // Scores
  const scoreBlock = document.getElementById('scores-block');
  scoreBlock.innerHTML = cls.scores.map(s => `
    <div class="score-row">
      <span class="score-label">${s.label}</span>
      <div class="score-track">
        <div class="score-fill" style="width:${(s.val/s.max)*100}%;background:${s.color}"></div>
      </div>
      <span class="score-val">${'⭐'.repeat(s.val)}</span>
    </div>
  `).join('');
}

async function saveImage() {
  const img = document.getElementById('result-img');
  try {
    const res = await fetch(img.src);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `OddOdd-AddAdd-${resultClass}-result.jpg`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    // fallback: open in new tab
    window.open(img.src, '_blank');
  }
}

function retryQuiz() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-cover').style.display = 'block';
}
</script>
</body>
</html>
